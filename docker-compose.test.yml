version: "3.8"
services:
  app:
    container_name: ghbs_test
    build:
      target: test
    image: ghbs:test
    command: bash -c "wait-for-it cache:6379 --strict --timeout=60 -- script/test"
    environment:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@db:5432/buy-for-your-school-test
      DATABASE_CLEANER_ALLOW_REMOTE_DATABASE_URL: "true"
      DOCKER: "true"
      CUPRITE_BROWSER_URL: http://chrome:3000
    depends_on:
      - chrome

  db:
    volumes:
      - db_test:/var/lib/postgresql/data

  cache:
    volumes:
      - cache_test:/data

  chrome:
    container_name: ghbs_chrome
    image: ghcr.io/browserless/chrome:v2.38.2
    ports:
      - 3000:3000
    volumes:
      - /dev/shm:/dev/shm
    networks:
      - ghbs

volumes:
  db_test:
  cache_test:
